name: Test

on:
    push:
        branches: [main]
        tags: ["*"]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Build
              run: go build ./...

            - name: Test
              run: go test -v -race -count=1 ./...
